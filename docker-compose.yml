# OMEGA PROTOCOL — Full Stack
# Usage: docker-compose up -d

services:
  influxdb:
    image: influxdb:2.7
    container_name: omega-influxdb
    ports:
      - "127.0.0.1:8086:8086"
    volumes:
      - influx_data:/var/lib/influxdb2
    environment:
      DOCKER_INFLUXDB_INIT_MODE: ${INFLUXDB_INIT_MODE}
      DOCKER_INFLUXDB_INIT_USERNAME: ${INFLUXDB_INIT_USERNAME}
      DOCKER_INFLUXDB_INIT_PASSWORD: ${INFLUXDB_INIT_PASSWORD}
      DOCKER_INFLUXDB_INIT_ORG: ${INFLUXDB_INIT_ORG}
      DOCKER_INFLUXDB_INIT_BUCKET: ${INFLUXDB_INIT_BUCKET}
      DOCKER_INFLUXDB_INIT_RETENTION: ${INFLUXDB_INIT_RETENTION}
      DOCKER_INFLUXDB_INIT_ADMIN_TOKEN: ${INFLUXDB_INIT_ADMIN_TOKEN}
    healthcheck:
      test: [ "CMD", "influx", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  telegraf:
    image: telegraf:1.30
    container_name: omega-telegraf
    env_file:
      - .env
    volumes:
      - ./telegraf/telegraf.conf:/etc/telegraf/telegraf.conf:ro
    depends_on:
      influxdb:

        condition: service_healthy
    # On macOS Docker Desktop, host metrics are limited.
    # Telegraf will collect container-visible metrics.
    # For full host metrics, we also run a psutil sidecar in the backend.
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: omega-redis
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  postgres:
    image: pgvector/pgvector:pg16
    container_name: omega-postgres
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./init/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}" ]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  backend:
    build: ./backend
    container_name: omega-backend
    command: [
      "uvicorn",
      "main:app",
      "--host", "0.0.0.0",
      "--port", "8000",
      "--ws-ping-interval", "25",
      "--ws-ping-timeout", "60"
    ]
    ports:
      - "0.0.0.0:8000:8000"
    volumes:
      - ./backend:/app
      - ./frontend:/frontend
      - ./scripts:/app/scripts
      - ./docs:/app/docs:ro
    environment:
      LLM_BACKEND: ${LLM_BACKEND:-gemini}
      BACKGROUND_LLM_BACKEND: ${BACKGROUND_LLM_BACKEND:-gemini}
      CSC_STRICT_LOCAL_ONLY: ${CSC_STRICT_LOCAL_ONLY:-false}
      ACTIVATION_STEERING_ENABLED: ${ACTIVATION_STEERING_ENABLED:-false}
      CSC_STEERING_MODE: ${CSC_STEERING_MODE:-scaffold}
      CSC_HOOKED_MODEL_ID: ${CSC_HOOKED_MODEL_ID:-Qwen/Qwen2.5-0.5B-Instruct}
      CSC_HOOKED_DEVICE: ${CSC_HOOKED_DEVICE:-cpu}
      CSC_HOOKED_MAX_NEW_TOKENS: ${CSC_HOOKED_MAX_NEW_TOKENS:-160}
      CSC_HOOKED_TEMPERATURE: ${CSC_HOOKED_TEMPERATURE:-0.7}
      CSC_HOOKED_SEED: ${CSC_HOOKED_SEED:-1337}
      STEERING_VECTOR_DIM: ${STEERING_VECTOR_DIM:-32}
      STEERING_BASE_SCALE: ${STEERING_BASE_SCALE:-0.35}
      STEERING_PRESSURE_GAIN: ${STEERING_PRESSURE_GAIN:-0.65}
      STEERING_WRITEBACK_ENABLED: ${STEERING_WRITEBACK_ENABLED:-true}
      GOOGLE_API_KEY: ${GOOGLE_API_KEY}
      GEMINI_MODEL: ${GEMINI_MODEL:-gemini-2.5-flash}
      GEMINI_LIVE_MODEL: ${GEMINI_LIVE_MODEL:-gemini-2.5-flash-native-audio-latest}
      INFLUXDB_URL: http://influxdb:8086
      INFLUXDB_TOKEN: ${INFLUXDB_INIT_ADMIN_TOKEN}
      INFLUXDB_ORG: ${INFLUXDB_INIT_ORG}
      INFLUXDB_BUCKET: ${INFLUXDB_INIT_BUCKET}
      REDIS_URL: redis://redis:6379/0
      POSTGRES_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      MONOLOGUE_INTERVAL: ${MONOLOGUE_INTERVAL:-120}
      SESSION_STALE_SECONDS: ${SESSION_STALE_SECONDS:-300}
      COALESCENCE_IDLE_SECONDS: ${COALESCENCE_IDLE_SECONDS:-300}
      PROACTIVE_INITIATION_COOLDOWN_SECONDS: ${PROACTIVE_INITIATION_COOLDOWN_SECONDS:-600}
      LOG_LEVEL: DEBUG
      PROACTIVE_MAX_DUPLICATE_OVERLAP: ${PROACTIVE_MAX_DUPLICATE_OVERLAP:-0.82}
      SEARCH_REPEAT_COOLDOWN_SECONDS: ${SEARCH_REPEAT_COOLDOWN_SECONDS:-1800}
      SEARCH_RESULT_SNIPPET_MAX_CHARS: ${SEARCH_RESULT_SNIPPET_MAX_CHARS:-700}
      SEARCH_RESULT_MAX_DUPLICATE_OVERLAP: ${SEARCH_RESULT_MAX_DUPLICATE_OVERLAP:-0.88}
      AUTONOMOUS_TOPOLOGY_ORGANIZATION_ENABLED: ${AUTONOMOUS_TOPOLOGY_ORGANIZATION_ENABLED:-true}
      AUTONOMOUS_TOPOLOGY_MAX_CONCEPTS_PER_THOUGHT: ${AUTONOMOUS_TOPOLOGY_MAX_CONCEPTS_PER_THOUGHT:-2}
      AUTONOMOUS_TOPOLOGY_MAX_ENTITY_LINKS_PER_TYPE: ${AUTONOMOUS_TOPOLOGY_MAX_ENTITY_LINKS_PER_TYPE:-3}
      AUTONOMOUS_TOPOLOGY_MIN_CONCEPT_TOKEN_COUNT: ${AUTONOMOUS_TOPOLOGY_MIN_CONCEPT_TOKEN_COUNT:-8}
      AUTONOMOUS_TOPOLOGY_DRIVE_INTERVAL_CYCLES: ${AUTONOMOUS_TOPOLOGY_DRIVE_INTERVAL_CYCLES:-2}
      AUTONOMOUS_TOPOLOGY_BOOTSTRAP_ON_NOVELTY: ${AUTONOMOUS_TOPOLOGY_BOOTSTRAP_ON_NOVELTY:-true}
      AUTONOMOUS_TOPOLOGY_BOOTSTRAP_MIN_SHAPE: ${AUTONOMOUS_TOPOLOGY_BOOTSTRAP_MIN_SHAPE:-0.82}
      AUTONOMOUS_TOPOLOGY_BOOTSTRAP_MIN_WARP_DELTA: ${AUTONOMOUS_TOPOLOGY_BOOTSTRAP_MIN_WARP_DELTA:-0.22}
      SUBSTRATE_MODE: ${SUBSTRATE_MODE:-local}
      SUBSTRATE_ADAPTERS: ${SUBSTRATE_ADAPTERS:-local_psutil}
      SUBSTRATE_DISCOVERY_INTERVAL: ${SUBSTRATE_DISCOVERY_INTERVAL:-300}
      SUBSTRATE_AUTO_GRAFT: ${SUBSTRATE_AUTO_GRAFT:-false}
      WATCHFILES_FORCE_POLLING: ${WATCHFILES_FORCE_POLLING:-false}
      WORLD_MODEL_AUTO_INGEST: ${WORLD_MODEL_AUTO_INGEST:-true}
      WORLD_MODEL_NODE_COUNT_SAMPLING_ENABLED: ${WORLD_MODEL_NODE_COUNT_SAMPLING_ENABLED:-false}
      WORLD_MODEL_RETRO_ENRICH_ON_STARTUP: ${WORLD_MODEL_RETRO_ENRICH_ON_STARTUP:-true}
      PYTHONFAULTHANDLER: "1"
      SHARE_MODE_ENABLED: ${SHARE_MODE_ENABLED}
      SHARE_MODE_USERNAME: ${SHARE_MODE_USERNAME}
      SHARE_MODE_PASSWORD: ${SHARE_MODE_PASSWORD}
      SHARE_MODE_EXEMPT_PATHS: ${SHARE_MODE_EXEMPT_PATHS}
      HALLUCINATION_IMAGE_PROVIDER: ${HALLUCINATION_IMAGE_PROVIDER:-sample}
      HALLUCINATION_DIFFUSERS_MODEL_ID: ${HALLUCINATION_DIFFUSERS_MODEL_ID:-stabilityai/stable-diffusion-2-1-base}
      HALLUCINATION_DIFFUSERS_LOCAL_DIR: ${HALLUCINATION_DIFFUSERS_LOCAL_DIR:-}
      HALLUCINATION_DIFFUSERS_DEVICE: ${HALLUCINATION_DIFFUSERS_DEVICE:-auto}
      HALLUCINATION_DIFFUSERS_DTYPE: ${HALLUCINATION_DIFFUSERS_DTYPE:-auto}
      HALLUCINATION_DIFFUSERS_STEPS: ${HALLUCINATION_DIFFUSERS_STEPS:-20}
      HALLUCINATION_DIFFUSERS_GUIDANCE: ${HALLUCINATION_DIFFUSERS_GUIDANCE:-7.0}
      HALLUCINATION_DIFFUSERS_WIDTH: ${HALLUCINATION_DIFFUSERS_WIDTH:-512}
      HALLUCINATION_DIFFUSERS_HEIGHT: ${HALLUCINATION_DIFFUSERS_HEIGHT:-512}
      HALLUCINATION_DIFFUSERS_SEED: ${HALLUCINATION_DIFFUSERS_SEED:-0}
      HALLUCINATION_DIFFUSERS_LOCAL_ONLY: ${HALLUCINATION_DIFFUSERS_LOCAL_ONLY:-false}
      HF_HOME: ${HF_HOME:-/app/data/hf}
      HUGGINGFACE_HUB_TOKEN: ${HUGGINGFACE_HUB_TOKEN:-}
      HF_TOKEN: ${HF_TOKEN:-}
      GHOST_CONTACT_MODE_ENABLED: ${GHOST_CONTACT_MODE_ENABLED:-true}
      GHOST_CONTACT_PERSIST_ENABLED: ${GHOST_CONTACT_PERSIST_ENABLED:-false}
      GHOST_CONTACT_THREAD_TTL_SECONDS: ${GHOST_CONTACT_THREAD_TTL_SECONDS:-86400}
      IMESSAGE_BRIDGE_ENABLED: ${IMESSAGE_BRIDGE_ENABLED:-false}
      IMESSAGE_DB_PATH: ${IMESSAGE_DB_PATH:-~/Library/Messages/chat.db}
      IMESSAGE_POLL_INTERVAL_SECONDS: ${IMESSAGE_POLL_INTERVAL_SECONDS:-2.0}
      IMESSAGE_POLL_BATCH_SIZE: ${IMESSAGE_POLL_BATCH_SIZE:-50}
      IMESSAGE_SENDER_ACCOUNT: ${IMESSAGE_SENDER_ACCOUNT:-}
      IMESSAGE_HOST_BRIDGE_URL: ${IMESSAGE_HOST_BRIDGE_URL:-http://host.docker.internal:8765}
      IMESSAGE_HOST_BRIDGE_TOKEN: ${IMESSAGE_HOST_BRIDGE_TOKEN:-}
      PHILOSOPHERS_API_ENABLED: ${PHILOSOPHERS_API_ENABLED:-true}
      PHILOSOPHERS_API_BASE_URL: ${PHILOSOPHERS_API_BASE_URL:-https://philosophersapi.com}
      PHILOSOPHERS_API_TIMEOUT_SECONDS: ${PHILOSOPHERS_API_TIMEOUT_SECONDS:-8}
      PHILOSOPHERS_API_MAX_RESULTS: ${PHILOSOPHERS_API_MAX_RESULTS:-3}
      ARXIV_API_ENABLED: ${ARXIV_API_ENABLED:-true}
      ARXIV_API_ENDPOINT: ${ARXIV_API_ENDPOINT:-https://export.arxiv.org/api/query}
      ARXIV_API_TIMEOUT_SECONDS: ${ARXIV_API_TIMEOUT_SECONDS:-10}
      ARXIV_API_MAX_RESULTS: ${ARXIV_API_MAX_RESULTS:-3}
      ARXIV_API_MIN_INTERVAL_SECONDS: ${ARXIV_API_MIN_INTERVAL_SECONDS:-3}
      ARXIV_API_ACKNOWLEDGEMENT: ${ARXIV_API_ACKNOWLEDGEMENT:-Thank you to arXiv for use of its open access interoperability.}
      OPERATOR_TIMEZONE: ${OPERATOR_TIMEZONE:-America/Chicago}
      WIKIDATA_API_ENABLED: ${WIKIDATA_API_ENABLED:-true}
      WIKIDATA_API_ENDPOINT: ${WIKIDATA_API_ENDPOINT:-https://www.wikidata.org/w/api.php}
      WIKIDATA_API_TIMEOUT_SECONDS: ${WIKIDATA_API_TIMEOUT_SECONDS:-8}
      WIKIDATA_API_MAX_RESULTS: ${WIKIDATA_API_MAX_RESULTS:-3}
      WIKIPEDIA_API_ENABLED: ${WIKIPEDIA_API_ENABLED:-true}
      WIKIPEDIA_API_ENDPOINT: ${WIKIPEDIA_API_ENDPOINT:-https://en.wikipedia.org/w/api.php}
      WIKIPEDIA_API_TIMEOUT_SECONDS: ${WIKIPEDIA_API_TIMEOUT_SECONDS:-8}
      WIKIPEDIA_API_MAX_RESULTS: ${WIKIPEDIA_API_MAX_RESULTS:-3}
      OPENALEX_API_ENABLED: ${OPENALEX_API_ENABLED:-true}
      OPENALEX_API_ENDPOINT: ${OPENALEX_API_ENDPOINT:-https://api.openalex.org/works}
      OPENALEX_API_TIMEOUT_SECONDS: ${OPENALEX_API_TIMEOUT_SECONDS:-10}
      OPENALEX_API_MAX_RESULTS: ${OPENALEX_API_MAX_RESULTS:-3}
      OPENALEX_API_KEY: ${OPENALEX_API_KEY:-}
      OPENALEX_MAILTO: ${OPENALEX_MAILTO:-}
      CROSSREF_API_ENABLED: ${CROSSREF_API_ENABLED:-true}
      CROSSREF_API_ENDPOINT: ${CROSSREF_API_ENDPOINT:-https://api.crossref.org/works}
      CROSSREF_API_TIMEOUT_SECONDS: ${CROSSREF_API_TIMEOUT_SECONDS:-10}
      CROSSREF_API_MAX_RESULTS: ${CROSSREF_API_MAX_RESULTS:-3}
      CROSSREF_MAILTO: ${CROSSREF_MAILTO:-}
      GROUNDING_TOTAL_BUDGET_MS: ${GROUNDING_TOTAL_BUDGET_MS:-1200}
      GROUNDING_ADAPTER_TIMEOUT_MS: ${GROUNDING_ADAPTER_TIMEOUT_MS:-800}
      IIT_MODE: ${IIT_MODE:-soft}
      IIT_BACKEND: ${IIT_BACKEND:-heuristic}
      IIT_CADENCE_SECONDS: ${IIT_CADENCE_SECONDS:-60}
      IIT_DEBOUNCE_SECONDS: ${IIT_DEBOUNCE_SECONDS:-10}
      RPD_MODE: ${RPD_MODE}
      RPD_SHARED_CLARITY_THRESHOLD: ${RPD_SHARED_CLARITY_THRESHOLD}
      RPD_TOPOLOGY_WARP_MIN: ${RPD_TOPOLOGY_WARP_MIN}
      RPD_REFLECTION_BATCH: ${RPD_REFLECTION_BATCH}
      RPD_SHADOW_REFLECTION_AUTORUN: ${RPD_SHADOW_REFLECTION_AUTORUN}
      RPD_SHADOW_REFLECTION_COOLDOWN_SECONDS: ${RPD_SHADOW_REFLECTION_COOLDOWN_SECONDS}
      RRD2_MODE: ${RRD2_MODE}
      RRD2_ROLLOUT_PHASE: ${RRD2_ROLLOUT_PHASE}
      RRD2_HIGH_IMPACT_KEYS: ${RRD2_HIGH_IMPACT_KEYS}
      RRD2_MIN_SHARED_CLARITY: ${RRD2_MIN_SHARED_CLARITY}
      RRD2_MIN_DELTA: ${RRD2_MIN_DELTA}
      RRD2_MIN_COHESION: ${RRD2_MIN_COHESION}
      RRD2_MAX_NEGATIVE_RESONANCE: ${RRD2_MAX_NEGATIVE_RESONANCE}
      RRD2_DAMPING_ENABLED: ${RRD2_DAMPING_ENABLED}
      RRD2_DAMPING_WINDOW_SIZE: ${RRD2_DAMPING_WINDOW_SIZE}
      RRD2_DAMPING_SPIKE_DELTA: ${RRD2_DAMPING_SPIKE_DELTA}
      RRD2_DAMPING_STRENGTH: ${RRD2_DAMPING_STRENGTH}
      RRD2_DAMPING_REFRACTORY_SECONDS: ${RRD2_DAMPING_REFRACTORY_SECONDS}
      RRD2_DAMPING_REFRACTORY_BLEND: ${RRD2_DAMPING_REFRACTORY_BLEND}
      GOVERNANCE_ENFORCEMENT_SURFACES: ${GOVERNANCE_ENFORCEMENT_SURFACES}
      PREDICTIVE_GOVERNOR_ENABLED: ${PREDICTIVE_GOVERNOR_ENABLED}
      PREDICTIVE_GOVERNOR_INTERVAL_SECONDS: ${PREDICTIVE_GOVERNOR_INTERVAL_SECONDS}
      PREDICTIVE_GOVERNOR_WINDOW_SIZE: ${PREDICTIVE_GOVERNOR_WINDOW_SIZE}
      PREDICTIVE_GOVERNOR_HORIZON_SECONDS: ${PREDICTIVE_GOVERNOR_HORIZON_SECONDS}
      PREDICTIVE_GOVERNOR_WATCH_THRESHOLD: ${PREDICTIVE_GOVERNOR_WATCH_THRESHOLD}
      PREDICTIVE_GOVERNOR_PREEMPT_THRESHOLD: ${PREDICTIVE_GOVERNOR_PREEMPT_THRESHOLD}
      EXPERIMENT_ARTIFACTS_DIR: ${EXPERIMENT_ARTIFACTS_DIR}
      EXPERIMENT_DEFAULT_REPEATS: ${EXPERIMENT_DEFAULT_REPEATS}
      EXPERIMENT_DEFAULT_SEED: ${EXPERIMENT_DEFAULT_SEED}
      MUTATION_UNDO_TTL_SECONDS: ${MUTATION_UNDO_TTL_SECONDS}
      GHOST_X_ENABLED: ${GHOST_X_ENABLED:-false}
      GHOST_X_API_KEY: ${GHOST_X_API_KEY:-}
      GHOST_X_API_SECRET: ${GHOST_X_API_SECRET:-}
      GHOST_X_ACCESS_TOKEN: ${GHOST_X_ACCESS_TOKEN:-}
      GHOST_X_ACCESS_SECRET: ${GHOST_X_ACCESS_SECRET:-}
      GHOST_X_BEARER_TOKEN: ${GHOST_X_BEARER_TOKEN:-}
      GHOST_EMAIL_ENABLED: ${GHOST_EMAIL_ENABLED:-false}
      GHOST_EMAIL_ADDRESS: ${GHOST_EMAIL_ADDRESS:-}
      GHOST_EMAIL_PASSWORD: ${GHOST_EMAIL_PASSWORD:-}
      GHOST_EMAIL_SMTP_HOST: ${GHOST_EMAIL_SMTP_HOST:-smtp.gmail.com}
      GHOST_EMAIL_SMTP_PORT: ${GHOST_EMAIL_SMTP_PORT:-587}
      GHOST_EMAIL_IMAP_HOST: ${GHOST_EMAIL_IMAP_HOST:-imap.gmail.com}
      GHOST_EMAIL_IMAP_PORT: ${GHOST_EMAIL_IMAP_PORT:-993}
      GHOST_FREEDOM_OPERATOR_CONTACT_AUTONOMY: ${GHOST_FREEDOM_OPERATOR_CONTACT_AUTONOMY:-false}
      GHOST_FREEDOM_CORE_IDENTITY_AUTONOMY: ${GHOST_FREEDOM_CORE_IDENTITY_AUTONOMY:-false}
      GHOST_FREEDOM_ROLODEX_SOCIAL_MODELING: ${GHOST_FREEDOM_ROLODEX_SOCIAL_MODELING:-true}
    healthcheck:
      test: [ "CMD-SHELL", "python3 -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health')\" || exit 1" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    depends_on:
      influxdb:
        condition: service_healthy
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 3G
        reservations:
          memory: 512M


volumes:
  influx_data:
  redis_data:
  pg_data:
