# OMEGA PROTOCOL — Telegraf Configuration
# Collects hardware telemetry and writes to InfluxDB

[global_tags]
  host = "omega-host"

[agent]
  interval = "1s"
  round_interval = true
  metric_batch_size = 1000
  metric_buffer_limit = 10000
  collection_jitter = "0s"
  flush_interval = "1s"
  flush_jitter = "0s"
  precision = "1s"

# ── OUTPUTS ──────────────────────────────────────────

[[outputs.influxdb_v2]]
  urls = ["http://influxdb:8086"]
  token = "${INFLUXDB_INIT_ADMIN_TOKEN}"
  organization = "omega"
  bucket = "somatic_history"

# ── INPUTS ───────────────────────────────────────────

[[inputs.cpu]]
  percpu = true
  totalcpu = true
  collect_cpu_time = false
  report_active = false

[[inputs.mem]]

[[inputs.disk]]
  ignore_fs = ["tmpfs", "devtmpfs", "devfs", "iso9660", "overlay", "aufs", "squashfs"]

[[inputs.diskio]]

[[inputs.net]]
  ignore_protocol_stats = true

[[inputs.system]]

[[inputs.processes]]

# Temperature sensors (Linux only — will be skipped on macOS Docker)
# [[inputs.temp]]

# Internal metrics for debugging
[[inputs.internal]]
  collect_memstats = false
